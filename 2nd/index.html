<!DOCTYPE html>
<html>
<head>
<title>Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center">User Registration</h3>

        <form id="regForm">

            <input type="text" id="name" class="form-control my-2" placeholder="Enter Name" required>

            <input type="email" id="email" class="form-control my-2" placeholder="Enter Email" required>

            <input type="password" id="password" class="form-control my-2" placeholder="Enter Password" required>

            <button class="btn btn-primary w-100 mt-3">Register</button>

        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
