<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stylish Exam Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3">
        <h3 class="text-center text-white">Admin</h3>
        <hr class="text-white">

        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="bi bi-people"></i> Students</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="bi bi-file-earmark-text"></i> Exams</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="bi bi-bar-chart"></i> Results</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-grow-1">

        <!-- Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm px-4">
            <span class="navbar-brand mb-0 h4">Exam Dashboard</span>
        </nav>

        <div class="container-fluid p-4">

            <!-- Cards -->
            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card stat-card bg-primary text-white">
                        <div class="card-body d-flex justify-content-between">
                            <div>
                                <h6>Total Students</h6>
                                <h3>250</h3>
                            </div>
                            <i class="bi bi-people fs-1"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card bg-success text-white">
                        <div class="card-body d-flex justify-content-between">
                            <div>
                                <h6>Total Exams</h6>
                                <h3>15</h3>
                            </div>
                            <i class="bi bi-file-earmark-text fs-1"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card bg-warning text-white">
                        <div class="card-body d-flex justify-content-between">
                            <div>
                                <h6>Results</h6>
                                <h3>10</h3>
                            </div>
                            <i class="bi bi-bar-chart fs-1"></i>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Table -->
            <div class="mt-5">
                <h4>Upcoming Exams</h4>

                <div class="table-responsive">
                    <table class="table table-hover mt-3 shadow-sm">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Subject</th>
                                <th>Date</th>
                                <th>Duration</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>101</td>
                                <td>WAD</td>
                                <td>10 May</td>
                                <td>2 hrs</td>
                                <td><span class="badge bg-success">Scheduled</span></td>
                            </tr>
                            <tr>
                                <td>102</td>
                                <td>DBMS</td>
                                <td>12 May</td>
                                <td>3 hrs</td>
                                <td><span class="badge bg-warning">Pending</span></td>
                            </tr>
                            <tr>
                                <td>103</td>
                                <td>CN</td>
                                <td>15 May</td>
                                <td>2 hrs</td>
                                <td><span class="badge bg-danger">Cancelled</span></td>
                            </tr>
                        </tbody>

                    </table>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
